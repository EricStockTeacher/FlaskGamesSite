{% extends 'index.html' %}

{% block body %}
    <h3>Enter your favourite Video Game</h3>
    <form method = "post" action="/greet" enctype="multipart/form-data">
        <p>Game Name</p>
        <input type="text" name="game" required>
        <br><br>
        <p>Platform</p>
        <input type="text" name="platform" required>
        <br><br>
        <p>Value</p>
        <input type="text" name="value" required>
        <br><br>
        <p>Release Year</p>
        <input type="text" name="year" required>
        <br><br>
        <input type="file" name="game_img" required>
        <br><br>
        <input type="submit" value="Submit">
    </form>
{% endblock %}
